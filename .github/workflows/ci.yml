name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PAPERLESS_URL: "http://localhost:8000"
  PAPERLESS_TOKEN: "test-token"
  PAPERLESS_INBOX_TAG_ID: "1"
  DATA_DIR: "/tmp/test-data"

jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Import check
        run: python -c "import app.main"

      - name: DB schema check
        run: python -c "from app.db import init_db; init_db()"

      - name: Prompt file check
        run: python -c "from app.pipeline.classifier import _load_system_prompt; assert len(_load_system_prompt()) > 100"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t test .
