name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PAPERLESS_URL: "http://localhost:8000"
  PAPERLESS_TOKEN: "test-token"
  PAPERLESS_INBOX_TAG_ID: "1"
  DATA_DIR: "/tmp/test-data"

jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -c constraints.txt -e ".[dev]"

      - name: Environment diagnostics
        run: |
          python --version
          python -m pip --version
          python -m pip freeze | sort
          python -m pip check
          which archibot || true
          python - <<'PY'
          import importlib.metadata as m
          for pkg in ["archibot", "fastapi", "starlette", "uvicorn", "mcp", "sse-starlette", "pytest", "ruff"]:
              try:
                  print(f"{pkg}=={m.version(pkg)}")
              except Exception as exc:
                  print(f"{pkg}: missing ({exc})")
          PY

      - name: Ruff lint
        run: python -m ruff check app/ tests/

      - name: Ruff format check
        run: python -m ruff format --check app/ tests/

      - name: Hadolint Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Dependency compatibility check
        run: python -m pip check

      - name: Install pip-audit
        run: |
          python -m pip install --progress-bar off -c constraints.txt pip-audit
          python -m pip show pip-audit

      - name: Run security audit
        run: |
          ARGS=""
          while IFS= read -r line; do
            line="${line%%#*}"
            line="$(echo "$line" | xargs)"
            [ -n "$line" ] && ARGS="$ARGS --ignore-vuln $line"
          done < .pip-audit-known-vulnerabilities
          echo "Running: python -m pip_audit --skip-editable $ARGS"
          eval python -m pip_audit --skip-editable $ARGS

      - name: Dependency age check (supply-chain protection)
        run: python scripts/check_dependency_age.py --min-days 3

      - name: Template syntax check
        run: |
          python -c "
          from jinja2 import Environment, FileSystemLoader
          env = Environment(loader=FileSystemLoader('app/templates'))
          templates = env.list_templates()
          for t in templates:
              env.get_template(t)
          print(f'All {len(templates)} templates OK')
          "

      - name: Console script check
        run: |
          archibot --help
          python -m app.cli --help

      - name: Import check
        run: python -c "import app.main"

      - name: DB schema check
        run: python -c "from app.db import init_db; init_db()"

      - name: Prompt file check
        run: python -c "from app.pipeline.classifier import _load_system_prompt; assert len(_load_system_prompt()) > 100"

      - name: Failure diagnostics
        if: failure()
        run: |
          echo "=== pip check ==="
          python -m pip check || true
          echo "=== pip freeze ==="
          python -m pip freeze | sort || true
          echo "=== archibot path ==="
          which archibot || true
          echo "=== import metadata ==="
          python - <<'PY'
          import importlib.metadata as m
          for pkg in ["archibot", "fastapi", "starlette", "uvicorn", "mcp", "sse-starlette", "pytest", "ruff"]:
              try:
                  print(f"{pkg}=={m.version(pkg)}")
              except Exception as exc:
                  print(f"{pkg}: missing ({exc})")
          PY

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t test .

      - name: Grype container scan
        uses: anchore/scan-action@v6
        id: grype
        with:
          image: test
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: table

      - name: Grype SARIF report
        uses: anchore/scan-action@v6
        if: always()
        id: grype-sarif
        with:
          image: test
          fail-build: false
          severity-cutoff: high
          only-fixed: true
          output-format: sarif

      - name: Upload Grype SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}

      - name: Trivy container scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --exit-code 1 \
            test

      - name: Trivy SARIF report
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output /work/trivy-results.sarif \
            test

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Verify CLI in Docker image
        run: docker run --rm test archibot --help
