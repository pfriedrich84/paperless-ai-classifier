{% extends "base.html" %}
{% block title %}Embeddings — ArchiBot{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Embeddings</h1>
    <p class="mt-1 text-sm text-gray-500">Vector database inspection and similarity search</p>
</div>

<!-- Overview card -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500">Embedded Documents</p>
        <p class="mt-2 text-3xl font-bold text-primary-600">{{ total_embedded }}</p>
    </div>

    <!-- Find similar by ID -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <p class="text-sm font-medium text-gray-500 mb-3">Find Similar by Document ID</p>
        <div class="flex space-x-2">
            <input type="number" id="similar-doc-id" name="doc_id" min="1"
                   placeholder="Enter document ID"
                   class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm
                          focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            <button type="button"
                    class="px-4 py-2 bg-primary-600 text-white text-sm font-medium rounded-lg
                           hover:bg-primary-700 transition-colors"
                    onclick="findSimilar()">
                Search
            </button>
        </div>
    </div>
</div>

<!-- Similar results area -->
<div id="similar-results" class="mb-8"></div>

<!-- Search + document table -->
<div class="bg-white rounded-xl shadow-sm border border-gray-200">
    <div class="p-4 border-b border-gray-200">
        <input type="search" name="q" value="{{ query }}"
               placeholder="Search by title..."
               hx-get="/embeddings/search"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#embeddings-table-area"
               hx-swap="innerHTML"
               hx-include="this"
               class="w-full sm:w-80 rounded-lg border border-gray-300 px-3 py-2 text-sm
                      focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
    </div>

    <div id="embeddings-table-area">
        {% include "partials/embeddings_table.html" %}
    </div>
</div>

<script>
function findSimilar() {
    var docId = document.getElementById("similar-doc-id").value;
    if (!docId) return;
    var target = document.getElementById("similar-results");
    target.innerHTML = '<p class="text-sm text-gray-400 py-4">Searching...</p>';
    htmx.ajax("GET", "/embeddings/similar/" + docId, {target: "#similar-results", swap: "innerHTML"});
}
document.getElementById("similar-doc-id").addEventListener("keydown", function(e) {
    if (e.key === "Enter") findSimilar();
});
</script>
{% endblock %}
