<tr id="suggestion-{{ s.id }}" class="hover:bg-gray-50 transition-colors">
    <td class="px-4 py-3 w-8">
        <input type="checkbox" name="suggestion_ids" value="{{ s.id }}"
               class="bulk-check rounded border-gray-300 text-primary-600 focus:ring-primary-500"
               {% if (s.confidence or 0) >= 80 %}checked{% endif %}>
    </td>
    <td class="px-4 py-3">
        <div class="text-sm font-medium text-gray-900">#{{ s.document_id }}</div>
        <div class="text-xs text-gray-400">{{ s.created_at[:16] }}</div>
    </td>
    <td class="px-4 py-3">
        <div class="text-sm text-gray-800">{{ s.proposed_title or '—' }}</div>
        {% if s.proposed_correspondent_name %}
        <div class="text-xs text-gray-400">{{ s.proposed_correspondent_name }}</div>
        {% endif %}
    </td>
    <td class="px-4 py-3 text-center">
        {% set conf = s.confidence or 0 %}
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
                     {{ 'bg-green-100 text-green-800' if conf >= 80 else ('bg-amber-100 text-amber-800' if conf >= 50 else 'bg-red-100 text-red-800') }}">
            {{ conf }}%
        </span>
    </td>
    <td class="px-4 py-3 text-right space-x-2">
        <a href="/review/{{ s.id }}"
           class="inline-flex items-center px-3 py-1.5 text-xs font-medium rounded-lg
                  bg-primary-50 text-primary-700 hover:bg-primary-100 transition-colors">
            Review
        </a>
        <button hx-post="/review/{{ s.id }}/reject"
                hx-target="#suggestion-{{ s.id }}"
                hx-swap="outerHTML"
                hx-confirm="Reject this suggestion?"
                class="inline-flex items-center px-3 py-1.5 text-xs font-medium rounded-lg
                       bg-red-50 text-red-700 hover:bg-red-100 transition-colors">
            Reject
        </button>
    </td>
</tr>
