<div id="chat-messages" class="p-4 space-y-4">
    {% for msg in messages %}
    <div class="flex {% if msg.role == 'user' %}justify-end{% else %}justify-start{% endif %}">
        <div class="max-w-[80%] rounded-lg px-4 py-3 text-sm whitespace-pre-wrap
                    {% if msg.role == 'user' %}
                    bg-primary-600 text-white
                    {% else %}
                    bg-gray-100 text-gray-800
                    {% endif %}">{{ msg.content }}</div>
    </div>
    {% endfor %}

    {% if sources %}
    <div class="text-xs text-gray-400 mt-2 pt-2 border-t border-gray-100">
        <span class="font-medium">Quellen:</span>
        {% for src in sources %}
        <span class="inline-block bg-gray-50 rounded px-1.5 py-0.5 mr-1 mb-1">
            #{{ src.id }} {{ src.title }} ({{ src.distance }})
        </span>
        {% endfor %}
    </div>
    {% endif %}
</div>
