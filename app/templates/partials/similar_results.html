<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-700">
            Similar to Document #{{ source_id }}
        </h2>
        <button type="button" onclick="document.getElementById('similar-results').innerHTML=''"
                class="text-gray-400 hover:text-gray-600 text-sm">
            Close
        </button>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">#</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Distance</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                {% for doc in similar %}
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 py-2 text-sm text-gray-400">{{ loop.index }}</td>
                    <td class="px-4 py-2 text-sm font-mono">
                        {% if paperless_url %}
                        <a href="{{ paperless_url }}/documents/{{ doc.document_id }}/details"
                           target="_blank" rel="noopener"
                           class="text-primary-600 hover:text-primary-800 hover:underline">
                            #{{ doc.document_id }}
                        </a>
                        {% else %}
                        #{{ doc.document_id }}
                        {% endif %}
                    </td>
                    <td class="px-4 py-2 text-sm text-gray-900">{{ doc.title }}</td>
                    <td class="px-4 py-2 text-sm font-mono">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                                     {% if doc.distance < 0.3 %}bg-green-100 text-green-800
                                     {% elif doc.distance < 0.6 %}bg-yellow-100 text-yellow-800
                                     {% else %}bg-red-100 text-red-800{% endif %}">
                            {{ "%.4f"|format(doc.distance) }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
